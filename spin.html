<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>House of Legends — Spin &amp; Win!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}

body{
  background:radial-gradient(ellipse at 50% 20%, #4a0018 0%, #22000c 45%, #0a0003 100%);
  display:flex;flex-direction:column;align-items:center;
  font-family:'Cinzel',serif;
  position:relative;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ── Stars ───────────────────────────────────── */
#stars-bg{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
}

/* ── Page wrapper ────────────────────────────── */
.page{
  position:relative;z-index:1;
  width:100%;max-width:540px;
  display:flex;flex-direction:column;align-items:center;
  padding:18px 12px 52px;
}

/* ── Top logo ────────────────────────────────── */
.top-logo{
  width:clamp(72px,18vw,96px);
  height:clamp(72px,18vw,96px);
  border-radius:50%;object-fit:cover;
  border:2px solid #B8860B;
  box-shadow:0 0 16px rgba(184,134,11,.5),0 0 32px rgba(139,0,0,.4);
  margin-bottom:10px;
}

/* ── Title ───────────────────────────────────── */
.title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2rem,9vw,3.4rem);
  font-weight:700;
  color:#FFD700;
  text-shadow:0 0 12px rgba(255,215,0,.95),0 0 30px rgba(255,165,0,.65),0 0 70px rgba(200,60,0,.35);
  text-align:center;letter-spacing:.04em;margin-bottom:3px;
}
.tagline{
  font-size:clamp(.6rem,2.5vw,.78rem);
  color:#c89b3c;letter-spacing:.28em;text-align:center;margin-bottom:6px;
}
.divider{
  width:min(220px,65vw);height:1px;
  background:linear-gradient(to right,transparent,#FFD700 40%,#FFD700 60%,transparent);
  margin:8px 0 16px;
}

/* ── Wheel wrapper ───────────────────────────── */
.wheel-wrap{
  position:relative;
  width:min(96vw,500px);
  height:min(96vw,500px);
  flex-shrink:0;
}

/* Pointer */
.pointer{
  position:absolute;
  top:-4px;left:50%;
  transform:translateX(-50%);
  z-index:5;
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:38px solid #FFD700;
  filter:drop-shadow(0 3px 8px rgba(255,215,0,.9)) drop-shadow(0 0 16px rgba(255,180,0,.7));
}

#wheel-canvas{width:100%;height:100%;border-radius:50%;}


/* ── Spin button ─────────────────────────────── */
.spin-btn{
  margin-top:26px;
  padding:16px 64px;
  font-family:'Cinzel',serif;
  font-size:clamp(1.5rem,6vw,2rem);
  font-weight:900;
  letter-spacing:.22em;
  color:#FFD700;
  background:linear-gradient(180deg,#4a0000 0%,#1a0000 100%);
  border:2px solid #FFD700;
  border-radius:60px;
  cursor:pointer;
  touch-action:manipulation;
  text-shadow:
    0 0 8px rgba(255,215,0,1),
    0 0 20px rgba(255,185,0,.9),
    0 0 45px rgba(255,120,0,.5);
  box-shadow:
    0 0 18px rgba(255,215,0,.55),
    0 0 36px rgba(180,20,20,.4),
    0 0 60px rgba(255,215,0,.18),
    inset 0 1px 0 rgba(255,215,0,.2);
  transition:all .15s ease;
  position:relative;overflow:hidden;
}
.spin-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,215,0,.1) 0%,transparent 100%);
  border-radius:60px;
}
.spin-btn:hover{
  box-shadow:
    0 0 28px rgba(255,215,0,.85),
    0 0 55px rgba(255,185,0,.55),
    0 0 90px rgba(255,215,0,.22),
    inset 0 1px 0 rgba(255,215,0,.3);
  transform:translateY(-2px);
}
.spin-btn:active{transform:translateY(1px) scale(.97);}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── Result Modal ────────────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(4,0,2,.9);
  backdrop-filter:blur(7px);
  z-index:200;
  justify-content:center;align-items:center;
  padding:20px;
}
.modal-overlay.open{display:flex;}

.modal{
  background:linear-gradient(155deg,#210009 0%,#2d0012 45%,#1a0008 100%);
  border:1.5px solid #B8860B;border-radius:24px;
  padding:36px 28px 28px;
  max-width:360px;width:100%;
  text-align:center;
  box-shadow:
    0 0 40px rgba(184,134,11,.28),
    0 0 80px rgba(139,0,0,.3),
    0 24px 60px rgba(0,0,0,.7);
  position:relative;animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.modal-emoji{font-size:3.5rem;animation:bounce .55s ease infinite alternate;}
@keyframes bounce{from{transform:scale(.88) translateY(0)}to{transform:scale(1.12) translateY(-8px)}}

.modal-won{
  font-family:'Cinzel Decorative',serif;
  font-size:1.65rem;font-weight:700;
  color:#FFD700;text-shadow:0 0 16px rgba(255,215,0,.85);
  margin:10px 0 5px;
}
.modal-prize{
  font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;
  color:#fff;margin-bottom:6px;letter-spacing:.06em;
}
.modal-divider{
  height:1px;
  background:linear-gradient(to right,transparent,#B8860B,transparent);
  margin:14px 0;
}
.modal-note{
  font-size:.95rem;font-weight:700;color:#FFD700;
  line-height:1.75;letter-spacing:.05em;margin-bottom:20px;
  text-shadow:0 0 8px rgba(255,215,0,.9),0 0 18px rgba(255,185,0,.65),0 0 32px rgba(255,140,0,.35);
}
.review-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:15px 20px;
  background:linear-gradient(135deg,#9B7500 0%,#FFD700 50%,#9B7500 100%);
  color:#0a0003;font-family:'Cinzel',serif;
  font-size:.9rem;font-weight:700;letter-spacing:.1em;
  border:none;border-radius:50px;cursor:pointer;
  text-decoration:none;
  box-shadow:0 0 22px rgba(255,215,0,.45),0 4px 16px rgba(0,0,0,.45);
  transition:all .15s ease;margin-bottom:10px;
}
.review-btn:hover{box-shadow:0 0 38px rgba(255,215,0,.75),0 4px 20px rgba(0,0,0,.45);transform:translateY(-1px);}
.later-btn{
  background:transparent;
  border:1px solid #4a1020;color:#7a4a5a;
  font-family:'Cinzel',serif;font-size:.75rem;
  letter-spacing:.12em;padding:10px 24px;
  border-radius:50px;cursor:pointer;transition:all .15s ease;
}
.later-btn:hover{border-color:#722F37;color:#c89b3c;}

/* ── QR section (shown at bottom for staff use) ─ */
.qr-section{
  margin-top:36px;text-align:center;
  padding:18px 16px;
  border:1px solid rgba(184,134,11,.25);
  border-radius:16px;
  background:rgba(0,0,0,.3);
  width:100%;
}
.qr-label{
  font-size:.65rem;color:#6a3a4a;letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:10px;
}
#qr-box{display:flex;justify-content:center;}
#qr-box canvas,#qr-box img{border-radius:6px;}
.qr-url{font-size:.55rem;color:#4a2a3a;margin-top:8px;word-break:break-all;letter-spacing:.03em;}
</style>
</head>
<body>

<canvas id="stars-bg"></canvas>

<div class="page">

  <!-- Top logo -->
  <img class="top-logo" src="logo.png" alt="House of Legends" onerror="this.style.display='none'" id="top-logo-img">

  <h1 class="title">Spin &amp; Win!</h1>
  <p class="tagline">✦ &nbsp; HOUSE OF LEGENDS &nbsp; ✦</p>
  <div class="divider"></div>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel-canvas"></canvas>
  </div>

  <!-- Spin button -->
  <button class="spin-btn" id="spin-btn" onclick="startSpin()">SPIN!</button>

  <!-- QR code (for staff / printing) -->
  <div class="qr-section">
    <p class="qr-label">📲 Scan to Play</p>
    <div id="qr-box"></div>
    <p class="qr-url" id="qr-url"></p>
  </div>

</div>

<!-- Result Modal -->
<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-emoji" id="m-emoji">🎉</div>
    <div class="modal-won">You Won!</div>
    <div class="modal-prize" id="m-prize">Free Shot</div>
    <div class="modal-divider"></div>
    <p class="modal-note">Leave us a Google review &amp; show our staff to claim your prize!</p>
    <a class="review-btn" id="review-link" href="#" target="_blank" rel="noopener">
      ⭐&nbsp; Leave a Google Review
    </a>
    <button class="later-btn" onclick="closeModal()">Maybe Later</button>
  </div>
</div>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — replace GOOGLE_REVIEW_URL with your Business review link
   Get it from: Google Business Profile → Get more reviews → Copy link
   ═══════════════════════════════════════════════════════════════ */
const GOOGLE_REVIEW_URL = 'https://g.page/r/REPLACE_WITH_YOUR_GOOGLE_PLACE_ID/review';

/* ── Wheel Segments ─────────────────────────────────────────────
   weight controls how wide each slice is.
   Lower weight = thinner slice (harder to land on).
   ─────────────────────────────────────────────────────────────── */
const SEGMENTS = [
  {
    label: 'Kiss Card',
    lines: ['Kiss', 'Card'],
    emoji: '💋',
    claim: 'Show staff for your Kiss Card! 💋',
    bg: '#6B0000', fg: '#FFD700',
    weight: 1,
  },
  {
    label: '20% Off Drink',
    lines: ['20% Off', 'Drink'],
    emoji: '🍹',
    claim: 'Show staff for 20% off your drink! 🍹',
    bg: '#9B7500', fg: '#1a0008',
    weight: 1,
  },
  {
    label: '50% Off Next Drink',
    lines: ['50% Off', 'Next Drink'],
    emoji: '🥂',
    claim: 'Show staff for 50% off your next drink! 🥂',
    bg: '#2D0000', fg: '#e8b84b',
    weight: 0.25,  // ← thin slice!
  },
  {
    label: 'Free Shot',
    lines: ['Free', 'Shot'],
    emoji: '🥃',
    claim: 'Show staff for your Free Shot! 🥃',
    bg: '#7B1A1A', fg: '#FFD700',
    weight: 1,
  },
  {
    label: 'Auction Ticket',
    lines: ['Auction', 'Ticket'],
    emoji: '🎫',
    claim: 'Show staff for your Auction Ticket! 🎫',
    bg: '#8B6A00', fg: '#1a0008',
    weight: 1,
  },
];

// Pre-compute angles
const TOT_W = SEGMENTS.reduce((s, x) => s + x.weight, 0);
let cum = 0;
SEGMENTS.forEach(s => {
  s.startA = (cum / TOT_W) * Math.PI * 2;
  s.sweepA = (s.weight / TOT_W) * Math.PI * 2;
  s.endA   = s.startA + s.sweepA;
  cum += s.weight;
});

/* ═══════════════════════════════════════════════════════════════
   STARS BACKGROUND
   ═══════════════════════════════════════════════════════════════ */
const starsBg = document.getElementById('stars-bg');
const sCtx    = starsBg.getContext('2d');
let stars = [];

const STAR_PALETTE = [
  '#FFD700','#FFA500','#FF6347','#DC143C',
  '#C0392B','#B8860B','#FF8C00','#FFFFFF',
  '#FFE5B4','#8B0000','#CD853F','#FF4500',
];

function initStars() {
  starsBg.width  = window.innerWidth;
  starsBg.height = window.innerHeight;
  stars = [];
  const n = Math.min(Math.floor(starsBg.width * starsBg.height / 3200), 240);
  for (let i = 0; i < n; i++) {
    stars.push({
      x:     Math.random() * starsBg.width,
      y:     Math.random() * starsBg.height,
      r:     Math.random() * 1.9 + 0.25,
      color: STAR_PALETTE[Math.floor(Math.random() * STAR_PALETTE.length)],
      phase: Math.random() * Math.PI * 2,
      freq:  Math.random() * 0.028 + 0.005,
      base:  Math.random() * 0.4 + 0.25,
    });
  }
}

function animStars(t) {
  sCtx.clearRect(0, 0, starsBg.width, starsBg.height);
  for (const s of stars) {
    const alpha = Math.max(0, Math.min(1, s.base + Math.sin(t * s.freq + s.phase) * 0.48));
    sCtx.globalAlpha = alpha;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = s.color;
    sCtx.fill();
  }
  sCtx.globalAlpha = 1;
  requestAnimationFrame(animStars);
}

initStars();
window.addEventListener('resize', initStars);
requestAnimationFrame(animStars);

/* ═══════════════════════════════════════════════════════════════
   WHEEL CANVAS
   ═══════════════════════════════════════════════════════════════ */
const wCanvas = document.getElementById('wheel-canvas');
const wCtx    = wCanvas.getContext('2d');
const DPR     = Math.min(window.devicePixelRatio || 1, 3);
let W, R, CX, CY;

/* ── Logo image (drawn on canvas so it never rotates with the wheel) ── */
const logoImg = new Image();
logoImg.src = 'logo.png';
logoImg.onload = () => drawWheel(wheelAngle);

function setupWheel() {
  const size = wCanvas.offsetWidth;
  W = size;
  wCanvas.width  = size * DPR;
  wCanvas.height = size * DPR;
  wCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  R  = size / 2 - 4;
  CX = size / 2;
  CY = size / 2;
}

let wheelAngle = 0;

function drawWheel(a) {
  wCtx.clearRect(0, 0, W, W);

  wCtx.save();
  wCtx.translate(CX, CY);
  wCtx.rotate(a);

  /* ── Draw each segment ── */
  for (const seg of SEGMENTS) {
    const drawStart = seg.startA - Math.PI / 2;
    const drawEnd   = seg.endA   - Math.PI / 2;
    const drawMid   = (drawStart + drawEnd) / 2;
    const sweepDeg  = seg.sweepA * (180 / Math.PI);

    // Fill
    wCtx.beginPath();
    wCtx.moveTo(0, 0);
    wCtx.arc(0, 0, R, drawStart, drawEnd);
    wCtx.closePath();
    wCtx.fillStyle = seg.bg;
    wCtx.fill();

    // Shine/depth overlay
    const shine = wCtx.createRadialGradient(
      Math.cos(drawMid) * R * 0.38, Math.sin(drawMid) * R * 0.38, 0,
      0, 0, R
    );
    shine.addColorStop(0,   'rgba(255,255,255,0.13)');
    shine.addColorStop(0.55,'rgba(255,255,255,0.03)');
    shine.addColorStop(1,   'rgba(0,0,0,0.2)');
    wCtx.beginPath();
    wCtx.moveTo(0, 0);
    wCtx.arc(0, 0, R, drawStart, drawEnd);
    wCtx.closePath();
    wCtx.fillStyle = shine;
    wCtx.fill();

    // Divider lines
    wCtx.beginPath();
    wCtx.moveTo(0, 0);
    wCtx.lineTo(Math.cos(drawStart) * R, Math.sin(drawStart) * R);
    wCtx.strokeStyle = 'rgba(255,215,0,0.75)';
    wCtx.lineWidth = 1.8;
    wCtx.stroke();

    /* ── Text ── */
    const textDist = R * 0.595;

    wCtx.save();
    wCtx.rotate(drawMid);
    wCtx.translate(textDist, 0);
    wCtx.rotate(Math.PI / 2);   // tangential orientation
    wCtx.textAlign    = 'center';
    wCtx.textBaseline = 'middle';

    if (sweepDeg < 26) {
      /* Very thin slice — show emoji only, horizontal along spoke */
      wCtx.rotate(-Math.PI / 2); // make emoji horizontal along radius
      const ePx = Math.round(R * 0.075);
      wCtx.font = `${ePx}px serif`;
      wCtx.fillStyle = seg.fg;
      wCtx.fillText(seg.emoji, 0, 0);
    } else {
      const emojiPx = Math.round(R * 0.105);
      const labelPx = Math.round(Math.max(R * 0.068, 9));
      const lineH   = labelPx * 1.38;

      // Calculate total content height to center it in the segment
      const totalH = emojiPx + lineH * seg.lines.length;
      const topOffset = -totalH / 2 + emojiPx / 2;

      // Emoji
      wCtx.font = `${emojiPx}px serif`;
      wCtx.fillStyle = seg.fg;
      wCtx.fillText(seg.emoji, 0, topOffset);

      // Label
      wCtx.font = `700 ${labelPx}px 'Cinzel', serif`;
      wCtx.fillStyle = seg.fg;
      seg.lines.forEach((line, i) => {
        const y = topOffset + emojiPx * 0.9 + lineH * 0.5 + i * lineH;
        wCtx.fillText(line, 0, y);
      });
    }

    wCtx.restore();
  }

  /* ── Outer gold rim ── */
  wCtx.beginPath();
  wCtx.arc(0, 0, R, 0, Math.PI * 2);
  wCtx.strokeStyle = '#FFD700';
  wCtx.lineWidth = 5;
  wCtx.shadowColor = 'rgba(255,215,0,0.7)';
  wCtx.shadowBlur  = 10;
  wCtx.stroke();
  wCtx.shadowBlur  = 0;

  wCtx.restore(); // ← wheel rotation ends here; everything below is unrotated

  /* ── Hub: dark backing circle ── */
  const hubR = R * 0.20;
  wCtx.beginPath();
  wCtx.arc(CX, CY, hubR, 0, Math.PI * 2);
  wCtx.fillStyle = '#080002';
  wCtx.fill();

  /* ── Hub: logo image clipped to circle ── */
  if (logoImg.complete && logoImg.naturalWidth > 0) {
    wCtx.save();
    wCtx.beginPath();
    wCtx.arc(CX, CY, hubR - 2, 0, Math.PI * 2);
    wCtx.clip();
    wCtx.drawImage(logoImg, CX - (hubR - 2), CY - (hubR - 2), (hubR - 2) * 2, (hubR - 2) * 2);
    wCtx.restore();
  }

  /* ── Hub: gold ring border ── */
  wCtx.beginPath();
  wCtx.arc(CX, CY, hubR, 0, Math.PI * 2);
  wCtx.strokeStyle = '#FFD700';
  wCtx.lineWidth = 2.5;
  wCtx.shadowColor = 'rgba(255,215,0,0.9)';
  wCtx.shadowBlur  = 10;
  wCtx.stroke();
  wCtx.shadowBlur  = 0;
}

/* ═══════════════════════════════════════════════════════════════
   SPIN LOGIC
   ═══════════════════════════════════════════════════════════════ */
let spinning = false;

function pickWinner() {
  const r = Math.random() * TOT_W;
  let c = 0;
  for (let i = 0; i < SEGMENTS.length; i++) {
    c += SEGMENTS[i].weight;
    if (r <= c) return i;
  }
  return 0;
}

function easeOutQuint(t) {
  return 1 - Math.pow(1 - t, 5);
}

function startSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;

  const winIdx = pickWinner();
  const seg    = SEGMENTS[winIdx];

  // We want the midpoint of the winning segment to sit under the pointer (top, screen angle = -π/2)
  // Drawing: each segment is drawn at (seg.startA - π/2) after overall wheel rotation a.
  // Pointer sits at screen top = 0 in rotated frame (since we rotate canvas to angle a).
  // Segment midpoint in draw-space: seg.startA + seg.sweepA/2 - π/2
  // We want that to equal -π/2 (mod 2π): → seg.startA + seg.sweepA/2 - π/2 + a = -π/2
  //   → a = -(seg.startA + seg.sweepA/2)
  const midA = seg.startA + seg.sweepA / 2;
  const baseTarget = -midA;

  // Add 6-10 full rotations for drama
  const extraRotations = (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;

  // Normalise so we always spin forward from current angle
  let target = wheelAngle + extraRotations;
  const rem  = ((baseTarget - target) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  target += rem;

  const startAngle = wheelAngle;
  const t0  = performance.now();
  const dur = 4600 + Math.random() * 2000;

  (function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    wheelAngle = startAngle + (target - startAngle) * easeOutQuint(t);
    drawWheel(wheelAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      wheelAngle = target;
      drawWheel(wheelAngle);
      spinning = false;
      setTimeout(() => showModal(winIdx), 650);
    }
  })(t0);
}

function showModal(idx) {
  const seg = SEGMENTS[idx];
  document.getElementById('m-emoji').textContent   = seg.emoji;
  document.getElementById('m-prize').textContent   = seg.label;
  document.getElementById('review-link').href      = GOOGLE_REVIEW_URL;
  document.getElementById('result-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('result-modal').classList.remove('open');
  document.getElementById('spin-btn').disabled = false;
}

/* ═══════════════════════════════════════════════════════════════
   QR CODE — auto-generates for whatever URL this page is served at
   ═══════════════════════════════════════════════════════════════ */
function buildQR() {
  const url = window.location.href;
  document.getElementById('qr-url').textContent = url;
  if (typeof QRCode !== 'undefined') {
    new QRCode(document.getElementById('qr-box'), {
      text: url,
      width: 160, height: 160,
      colorDark: '#1a0008',
      colorLight: '#FFE5B4',
      correctLevel: QRCode.CorrectLevel.H,
    });
  }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  setupWheel();
  drawWheel(wheelAngle);
});

// Wait for Cinzel to load before first draw so text renders correctly
document.fonts.ready.then(() => {
  setupWheel();
  drawWheel(0);
  buildQR();
});
</script>
</body>
</html>
